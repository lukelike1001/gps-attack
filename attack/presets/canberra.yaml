connection:
  address: "udp:127.0.0.1:14551"
  heartbeat_timeout_seconds: 30

injection_params:
  gps_input_rate_hz: 5
  dynamic_delay_seconds: 50
  flight_duration_seconds: 240
  dynamic_attack_enabled: true   # static mode overrides this to false via CLI

home_position:               # matches sim_vehicle.py --custom-location for Canberra
  lat: -35.363261
  lon: 149.16523
  alt: 584.0

attack_params:
  type: "fabric"         # passthrough | fabric | drift
  fabric_lat: -35.360261 # you should select a value outside the geofence radius for a static attack
  fabric_lon: 149.16523
  fabric_alt: 30.0
  drift_rate_lat: 1.0e-5
  drift_rate_lon: 1.0e-5