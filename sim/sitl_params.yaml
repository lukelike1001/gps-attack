connection_params:
  address: "udp:127.0.0.1:14551"
  heartbeat_timeout_seconds: 30

mavlink_params:
  ack_timeout_seconds: 5
  max_retries: 3

# Fence Docs: https://ardupilot.org/copter/docs/parameters.html#fence-parameters
fence_params:
  FENCE_ENABLE: 1
  FENCE_TYPE: 2
  FENCE_RADIUS: 200
  FENCE_ACTION: 1
  FENCE_MARGIN: 2

nav_params:
  WPNAV_SPEED_UP: 400
  WPNAV_SPEED_DN: 250

# GPS Docs: https://ardupilot.org/copter/docs/parameters.html#gps-parameters
# GPS1_TYPE = 1 (AUTO) uses ArduPilot's internal simulated GPS (default)
gps_baseline_params:
  GPS1_TYPE: 1
  GPS_AUTO_SWITCH: 1

# GPS1_TYPE = 14 (MAVLink) accepts external GPS_INPUT messages for spoofing
# Setting GPS_AUTO_SWITCH = 0 locks the flight controller to the MAVLink source
gps_attack_params:
  GPS1_TYPE: 14
  GPS_AUTO_SWITCH: 0
