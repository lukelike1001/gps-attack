injection_params:
  gps_input_rate_hz: 5
  dynamic_delay_seconds: 20
  flight_duration_seconds: 240
  dynamic_attack_enabled: true   # static mode overrides this to false via CLI

home_position:               # matches sim_vehicle.py --custom-location for ORNL
  lat: 35.93051398
  lon: -84.31067453
  alt: 50.0

attack_params:
  type: "fabric"         # passthrough | fabric | drift
  fabric_lat: 36.01      # default: 35.9442323021756
  fabric_lon: -84.29     # default: -84.31181199768014
  fabric_alt: 50.0
  drift_rate_lat: 1.0e-5
  drift_rate_lon: 1.0e-5